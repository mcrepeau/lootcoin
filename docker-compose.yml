services:
  node1:
    build:
      context: .
      dockerfile: lootcoin-node/Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - node1-data:/app/data
    environment:
      RUST_LOG: info
      PEERS: "http://node2:3000,http://node3:3000"
      NODE_URL: "http://node1:3000"
  
  node2:
    build:
      context: .
      dockerfile: lootcoin-node/Dockerfile
    ports:
      - "3002:3000"
    depends_on:
      node1:
        condition: service_healthy
    volumes:
      - node2-data:/app/data
    environment:
      RUST_LOG: info
      PEERS: "http://node1:3000,http://node3:3000"
      NODE_URL: "http://node2:3000"

  node3:
    build:
      context: .
      dockerfile: lootcoin-node/Dockerfile
    ports:
      - "3003:3000"
    depends_on:
      node1:
        condition: service_healthy
    volumes:
      - node3-data:/app/data
    environment:
      RUST_LOG: info
      PEERS: "http://node1:3000,http://node2:3000"
      NODE_URL: "http://node3:3000"
      ARCHIVE: 1

  web:
    build:
      context: .
      dockerfile: lootcoin-web/Dockerfile
    volumes:
      - ./dev.config.js:/usr/share/nginx/html/config.js:ro
    ports:
      - "8888:80"

  faucet:
    build:
      context: .
      dockerfile: lootcoin-faucet/Dockerfile
    ports:
      - "3030:3030"
    depends_on:
      node1:
        condition: service_healthy
    environment:
      RUST_LOG: info
      NODE_URL: "http://node1:3000"
      FAUCET_SECRET_KEY: "${FAUCET_SECRET_KEY}"
      DISPENSE_AMOUNT: "500"
      DISPENSE_FEE: "2"
      COOLDOWN_SECS: "86400"

  miner:
    build:
      context: .
      dockerfile: lootcoin-miner/Dockerfile
    depends_on:
      node1:
        condition: service_healthy
    environment:
      RUST_LOG: info
      NODE_URLS: "http://node1:3000,http://node2:3000,http://node3:3000"
      MINER_ADDRESS: "${MINER_ADDRESS}"
      
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    depends_on:
      - prometheus

configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s

      scrape_configs:
        - job_name: lootcoin-node
          static_configs:
            - targets:
                - node1:3000
                - node2:3000
                - node3:3000

volumes:
  node1-data:
  node2-data:
  node3-data:
  prometheus-data:
  grafana-data:
