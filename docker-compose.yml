services:
  node:
    build:
      context: .
      dockerfile: lootcoin-node/Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - node-data:/app/data
    environment:
      RUST_LOG: info
      PEERS: ""
      NODE_URL: "http://node:3000"

  web:
    build:
      context: .
      dockerfile: lootcoin-web/Dockerfile
    ports:
      - "8888:80"

  faucet:
    build:
      context: .
      dockerfile: lootcoin-faucet/Dockerfile
    ports:
      - "3030:3030"
    depends_on:
      - node
    environment:
      RUST_LOG: info
      NODE_URL: "http://node:3000"
      FAUCET_SECRET_KEY: "${FAUCET_SECRET_KEY}"
      DISPENSE_AMOUNT: "500"
      DISPENSE_FEE: "2"
      COOLDOWN_SECS: "86400"

  miner:
    build:
      context: .
      dockerfile: lootcoin-miner/Dockerfile
    depends_on:
      - node
    environment:
      RUST_LOG: info
      NODE_URLS: "http://node:3000"
      MINER_ADDRESS: "${MINER_ADDRESS}"
      
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml

configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
      
      scrape_configs:
        - job_name: lootcoin-node
          static_configs:
            - targets:
                - node:3000

volumes:
  node-data:
  prometheus-data:
