name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p lootcoin-wallet --bin lc --target ${{ matrix.target }}

      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/lc

      - name: Generate completions and man page (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/lc
          mkdir -p extras/completions extras/man
          "$BIN" completions bash > extras/completions/lc.bash
          "$BIN" completions zsh  > extras/completions/lc.zsh
          "$BIN" completions fish > extras/completions/lc.fish
          "$BIN" man              > extras/man/lc.1

      - name: Generate completions and man page (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BIN = "target\${{ matrix.target }}\release\lc.exe"
          New-Item -ItemType Directory -Force extras/completions, extras/man | Out-Null
          & $BIN completions bash       | Set-Content -Encoding utf8NoBOM extras/completions/lc.bash
          & $BIN completions zsh        | Set-Content -Encoding utf8NoBOM extras/completions/lc.zsh
          & $BIN completions fish       | Set-Content -Encoding utf8NoBOM extras/completions/lc.fish
          & $BIN completions powershell | Set-Content -Encoding utf8NoBOM extras/completions/lc.ps1
          & $BIN man                    | Set-Content -Encoding utf8NoBOM extras/man/lc.1

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          STAGING="lc-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$STAGING"
          cp target/${{ matrix.target }}/release/lc "$STAGING/"
          cp -r extras/completions extras/man "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $STAGING = "lc-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory $STAGING | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\lc.exe" "$STAGING\"
          Copy-Item -Recurse extras/completions, extras/man "$STAGING\"
          Compress-Archive "$STAGING" "${STAGING}.zip"
          "ASSET=${STAGING}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: lc-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Compute SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum lc-* | tee checksums.txt
          echo '### SHA-256 checksums' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat checksums.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/lc-*
            dist/checksums.txt
